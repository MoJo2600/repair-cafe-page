<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repair Cafe - Vue App</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div id="app"></div>
    
    {% if config.get('ENV') == 'development' or config.DEBUG %}
    <!-- Development mode: Vite dev server -->
    <script type="module" src="http://localhost:5173/@vite/client"></script>
    <script type="module" src="http://localhost:5173/frontend/src/main.ts"></script>
    {% else %}
    <!-- Production mode: Built assets -->
    <script type="module" src="{{ url_for('static', filename='dist/assets/main.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/assets/main.css') }}">
    {% endif %}
</body>
</html>
