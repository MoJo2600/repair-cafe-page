		<script type="module">

			};

					$('#sonstigeReparatur').hide();
					$('#reparatur_sonstiges').textinput('disable');
				}
			});

			console.log(token());

				a.document.write('<html>');
				a.document.write('<head><style>.row { display: flex; } .column { flex: 50%; } @media print { img { display: block; max-width: 100%; page-break-inside: avoid; } }</style></head>');

				a.document.write('<div class="row">');
				a.document.write('<div class="column" id="qrcode"></div>');
				a.document.write('<div class="column"><b>Unterschrift Kunde:</b><br><img height="130" src="' + img + '" /></div>');
				a.document.write('</div><br>');
				a.document.write(divContents);

				a.document.write('<br><br><br><br><table style="width: 95%">');

				a.document.write('</tr>');
				a.document.write('<tr style="height: 5em;">');
				a.document.write('<td style="width: 150px; text-align: right; border-bottom: 2px solid darkgrey;">Reparatur Ergebnis:</td>');

					sign = signaturePad.toDataURL();
					const ratio =  Math.max(window.devicePixelRatio || 1, 1);
					canvas.width = canvas.offsetWidth * ratio;
					canvas.height = canvas.offsetHeight * ratio;
					canvas.getContext("2d").scale(ratio, ratio);
					signaturePad.clear(); // otherwise isEmpty() might return incorrect valuereturn;
					signaturePad.formdata(sign);
				}
				else {
					return;
				}
			};

			var getHtmlLabelFromInputName = function(name){
				// Search for the label text of that input field in the dom, if it exists (it uses the strict for defintion of the input name)
				// returns the text
				var label = $('label[for="' + name + '"]').text()+":";
				return label;
			};

			function mapSpecificValues(key, value){
				if (value == 1){
					return 'JA';
				}
				else if (value == 0){
					return 'NEIN';
				}
				// if key is datum, transform to german format date
				else if (key == 'datum'){
					var date = new Date(value);
					return date.toLocaleDateString('de-DE');
				}
				else{
					return value;
				}
			}

				$('#addRepair').on('submit', function (event) {
					event.preventDefault();
					event.stopPropagation();

					// Get the form data as json
					var form = $(this);
					var formdata = form.serializeArray();
					var data = {};
					$(formdata).each(function (index, obj) {
						if (obj.name === 'datum' && obj.value === '') {
							obj.value = new Date().toISOString().split('T')[0];
						}
						data[obj.name] = obj.value;
					});

					var body = '<div id="toPrint"><table style="width: 95%">' +
						'<colgroup><col style="width: 150px;"></colgroup>' +
						Object.entries(data).map(([key, value]) => `<tr><td style="text-align: right; border-bottom: 2px solid darkgrey;">${getHtmlLabelFromInputName(key)}</td><td style="padding-left:15px; text-align: left; border-bottom: 2px solid darkgrey;">${mapSpecificValues(key, value)}</td></tr>`).join('') +
						'</table></div>';
					var canvas = '<br>Unterschrift:<br><canvas id="signature-pad" class="signature-pad" width=600 height=200></canvas>';
					// Show the entered content in a SweetAlert popup
					Swal.fire({
						icon: "info",
						width: "80%",
						showCloseButton: true,
						showConfirmButton: true,
						confirmButtonText: 'OK',
						title: 'Eingaben korrekt?',
						html: body+canvas,
						input: "checkbox",
						inputPlaceholder: 'Ich akzeptiere die Haftungsbedingungen',
						inputValidator: (result) => {
							return !result && "Die Haftungsbedingungen müssen akzeptiert werden!";
						},
						willOpen: () => {
							signaturePad = new SignaturePad(document.getElementById('signature-pad'));
							signaturePad.penColor = "rgb(65, 105, 225)";
							signaturePad.backgroundColor = "rgb(255,255,255)";
							signaturePad.addEventListener("beginStroke", () => {
								console.log("Signature started");
							}, { once: true });
						},
						preConfirm: () => {
							if (signaturePad.isEmpty()) {
								Swal.showValidationMessage('Unterschrift fehlt!');
							}
							else {
								//trimCanvas(document.getElementById('signature-pad'));
								signaturePad.penColor = "rgb(65, 105, 225)";
								signaturePad.backgroundColor = "rgb(255,255,255)";
								var sign = signaturePad.toDataURL();
								data['unterschrift'] = sign;
								data['unterschrift_haft'] = 1;
								data['qr_token'] = token();
								return sign;
							}
						}
					}).then((result) => {
						if (result.isConfirmed) {
							// Continue with the AJAX request
							$.ajax({
								url: '{{ url_for('add') }}',
								async: 'true',
								type: 'POST',
								data: JSON.stringify(data),
								dataType: 'json',
								contentType: "application/json; charset=utf-8",
								beforeSend: function () {
									// This callback function will trigger before data is sent
									$.mobile.loading('show'); // This will show Ajax spinner
								},
								complete: function () {
									// This callback function will trigger on data sent/received complete  
									$.mobile.loading('hide'); // This will hide Ajax spinner
								},
								success: function (result) {
									// Handle the success response
									console.log(result);
									var jres = result;
									if (jres.reply === 'done') {
										Swal.fire({
											icon: "success",
											showCloseButton: true,
											showConfirmButton: true,
											width: "80%",
											confirmButtonText: 'Drucken',
											title: 'Reparatur '+jres.id+' erfolgreich hinzugefügt!',
											html: body+'<img src="' + jres.data.unterschrift + '" /></div>',
										}).then((result) => {
											if (result.isConfirmed) {
												printDiv('toPrint', jres.id, jres.data.unterschrift, jres.data.qr_token);
												// Reload the page
												location.reload();
											}
											else {
												// Reload the page
												location.reload();
											}
										});
									} else {
										Swal.fire({
											icon: "error",
											showCloseButton: true,
											showConfirmButton: false,
											width: "50%",
											timer: 10000,
											timerProgressBar: true,
											text: 'Fehler bei der Anlage der Reparatur!',
										});
									}
								},
								error: function (request) {
									// Handle the error response
									Swal.fire({
										icon: "error",
										showCloseButton: true,
										showConfirmButton: false,
										width: "50%",
										timer: 10000,
										timerProgressBar: true,
										text: 'Network error has occurred please try again!: ' + JSON.stringify(request),
									});
									console.log('Network error has occurred please try again!: ' + JSON.stringify(request));
								}
							});
						}
					});
				});
				
			});
