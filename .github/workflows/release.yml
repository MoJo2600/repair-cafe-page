name: Release & Build

on:
  push:
    branches:
      - main

permissions:
  contents: write       # create tags + releases
  pull-requests: write  # create/update release PR
  packages: write       # push to ghcr.io

jobs:
  # ── Release Please ──────────────────────────────────────────────────────────
  # On every push to main:
  # • Creates / updates a "Release PR" that bumps the version and CHANGELOG.
  # • When that PR is merged, creates a Git tag and a GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker build (multi-arch) ────────────────────────────────────────────────
  # Runs only when release-please has just created a release (i.e. a new tag).
  # Produces a single OCI manifest covering linux/amd64 and linux/arm64
  # (x86 servers and Raspberry Pi 4/5).
  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # QEMU lets the amd64 runner build arm64 layers via emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Push to GitHub Container Registry — credentials are built-in
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ needs.release-please.outputs.tag_name }}
            ${{ env.IMAGE }}:latest
          # Layer cache stored in the GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
