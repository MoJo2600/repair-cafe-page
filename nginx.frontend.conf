server {
    listen 80;
    server_name _;

    # Allow larger uploads (logo images, PDFs sent via API)
    client_max_body_size 16m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # ── API → backend container ───────────────────────────────────────────────
    # All /api/* routes (REST endpoints + auth) are handled by Flask/Gunicorn.
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection      "";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeout for slow operations (PDF signing, CSV export)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    # ── Vite content-hashed assets — immutable cache ──────────────────────────
    # Vite names every asset file with a content hash, so these never change.
    location /assets/ {
        root /usr/share/nginx/html;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── SPA — serve Vite's index.html for everything else ────────────────────
    # try_files serves exact files first (favicon.ico, icon-512.png, etc. from
    # frontend/public/), then falls back to a named location that serves
    # index.html so Vue Router can handle the route client-side.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ @spa;
        add_header Cache-Control "no-cache";
    }

    location @spa {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        try_files /index.html =503;
    }
}
