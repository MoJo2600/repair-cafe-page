services:

  app:
    image: ghcr.io/mojo2600/repaircafepage:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repaircafepage}
      MYSQL_USER: ${MYSQL_USER:-repaircafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      # Optional – email export
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      MAIL_TOKEN: ${MAIL_TOKEN:-}
      MAIL_SENDER: ${MAIL_SENDER:-}
      MAIL_SENDER_NAME: ${MAIL_SENDER_NAME:-RepairCafe}
      EXPORT_MAIL_RECEIVER: ${EXPORT_MAIL_RECEIVER:-}
      PAGE_PASSWORD: ${PAGE_PASSWORD:-}
    volumes:
      - app_data:/data
      - ./config:/config:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repaircafepage}
      MYSQL_USER: ${MYSQL_USER:-repaircafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  app_data:
