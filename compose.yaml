services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
   # image: ghcr.io/mojo2600/repaircafepage-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    #image: ghcr.io/mojo2600/repaircafepage-backend:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repaircafepage}
      MYSQL_USER: ${MYSQL_USER:-repaircafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SECRET_KEY: ${FLASK_SECRET_KEY}
      # Optional – email export
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      MAIL_TOKEN: ${MAIL_TOKEN:-}
      MAIL_SENDER: ${MAIL_SENDER:-}
      MAIL_SENDER_NAME: ${MAIL_SENDER_NAME:-RepairCafe}
      EXPORT_MAIL_RECEIVER: ${EXPORT_MAIL_RECEIVER:-}
      PAGE_PASSWORD: ${PAGE_PASSWORD:-}
      # Set to "true" only when TLS terminates upstream (HTTPS deployment).
      # Over plain HTTP (local network / Pi) keep this "false".
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    volumes:
      - app_data:/data
      - ./config:/config:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repaircafepage}
      MYSQL_USER: ${MYSQL_USER:-repaircafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Optional one-off services ──────────────────────────────────────────────

  seed:
    build:
      context: .
      dockerfile: Dockerfile.backend
    profiles: ["seed"]
    entrypoint: ["python", "/srv/app/seed_dev.py"]
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repaircafepage}
      MYSQL_USER: ${MYSQL_USER:-repaircafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  app_data:
