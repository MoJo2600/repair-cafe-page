server {
    listen 80;
    server_name _;

    # Allow larger uploads (PDF templates, logo images)
    client_max_body_size 16m;

    # Gzip for API responses and text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Vue dist assets — served directly from the filesystem ────────────────
    # Vite content-hashes every filename; cache forever, no Python overhead.
    location /static/dist/ {
        alias /srv/app/static/dist/;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Everything else → Gunicorn on localhost ──────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection      "";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeout for slow operations (PDF signing, CSV export)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Buffer responses so Gunicorn workers are freed quickly
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }
}
