server {
    listen 80;
    server_name _;

    # Allow larger uploads (PDF templates, logo images)
    client_max_body_size 16m;

    # Gzip for API responses and text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Vue dist assets ──────────────────────────────────────────────────────
    # Vite content-hashes every filename so these can be cached indefinitely.
    # proxy_hide_header strips Flask's "no-cache" header before we add our own.
    location /static/dist/ {
        proxy_pass http://app:5000;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_read_timeout 30s;
    }

    # ── Everything else → Gunicorn ───────────────────────────────────────────
    location / {
        proxy_pass http://app:5000;
        proxy_http_version 1.1;
        proxy_set_header Connection      "";
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Generous timeout for slow operations (PDF signing, CSV export)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Buffer responses so Gunicorn workers are freed quickly
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }
}
